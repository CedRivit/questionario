<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RIVIT S.p.A SB - Contact Form</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        background-image: url('intro.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 2rem;
    }
    .status-dot {
        height: 8px;
        width: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    .syncing { animation: pulse 1.5s infinite; }
    
    #configOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .splash-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: transform 0.2s;
    }
    .splash-btn:active { transform: scale(0.9); }
    .splash-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>
</head>
<body class="antialiased text-slate-900">

<!-- CONFIG OVERLAY invariato -->

<div class="w-full max-w-2xl mx-auto p-4 sm:p-6 lg:p-8">

<header class="mb-6">
    <div class="glass-panel p-4 sm:p-6 shadow-2xl flex justify-between items-center border-b-4 border-red-600">
        <div class="flex items-center gap-3">
            <img src="FOTO1.jpg" alt="RIVIT Logo" class="h-14 w-auto">
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-800">RIVIT S.p.A SB</h1>
        </div>
    </div>
</header>

<main class="glass-panel p-6 sm:p-8 shadow-2xl border-b-4 border-slate-200">
<form id="contactForm" class="space-y-6">

<!-- BLOCCO DATI AZIENDA invariato -->

<!-- PHONE CONTACTS invariato -->
<div class="space-y-4">
<label class="block text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 italic">Phone Contacts</label>

<div class="flex flex-col sm:flex-row gap-2">
<div class="flex flex-1 gap-2">
<select id="prefixMobile" class="w-44 p-3 bg-white border border-slate-200 rounded-2xl font-bold text-[11px] outline-none">
<script>document.write(countryOptions());</script>
</select>
<input type="tel" id="mobile" required placeholder="Mobile Number" class="flex-1 p-3 bg-white border border-slate-200 rounded-2xl outline-none focus:border-red-500">
</div>
</div>

<div class="flex flex-col sm:flex-row gap-2">
<div class="flex flex-1 gap-2">
<select id="prefixLandline" class="w-44 p-3 bg-white border border-slate-200 rounded-2xl font-bold text-[11px] outline-none">
<script>document.write(countryOptions());</script>
</select>
<input type="tel" id="landline" placeholder="Landline Number" class="flex-1 p-3 bg-white border border-slate-200 rounded-2xl outline-none focus:border-red-500">
</div>
</div>
</div>

<!-- ✅ NUOVO CAMPO EMAIL AGGIUNTO QUI -->
<div>
<label class="block text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 italic">Email</label>
<input type="email" id="email" required 
class="w-full p-3 bg-white border border-slate-200 rounded-2xl outline-none focus:border-red-500" 
placeholder="example@email.com">
</div>

<!-- resto del form invariato -->

<div class="grid grid-cols-1 gap-4">
<textarea id="activity" rows="2" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:border-red-500" placeholder="What is your business activity?"></textarea>
<textarea id="lookingFor" rows="2" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:border-red-500" placeholder="What are you looking for from Rivit?"></textarea>
</div>

<div class="flex flex-col sm:flex-row gap-3">
<button type="submit" id="submitBtn" class="w-full sm:w-2/3 py-5 bg-red-600 text-white font-bold rounded-3xl shadow-xl">
<i class="fas fa-save"></i> Save Contact
</button>
</div>

</form>
</main>
</div>

<script>

document.getElementById('contactForm').onsubmit = async function(e){
e.preventDefault();

const data={
company: document.getElementById('company').value,
fullName: document.getElementById('fullName').value,
city: document.getElementById('city').value,
mobile: document.getElementById('prefixMobile').value + " " + document.getElementById('mobile').value,
landline: document.getElementById('prefixLandline').value + " " + document.getElementById('landline').value,
email: document.getElementById('email').value,  // ✅ AGGIUNTA QUI
activity: document.getElementById('activity').value,
lookingFor: document.getElementById('lookingFor').value,
timestamp: new Date().toLocaleString()
};

console.log(data);
alert("Dati pronti per il salvataggio!");
};

</script>

</body>
</html>
